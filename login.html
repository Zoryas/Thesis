<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="stylesheets/login.css">
</head>
<body>
  <div class="background">
    <div class="container">
      <div class="card">
        <div class="card-intro">
          <p class="eyebrow">ReadWise</p>
          <h1 class="title">Sign in</h1>
          <p class="subtitle">Choose your portal and continue with weekly reading passages, assessments, and class progress.</p>
        </div>

        <div class="toggle-container">
          <button id="studentBtn" class="toggle-button active" type="button">Student</button>
          <button id="teacherBtn" class="toggle-button" type="button">Teacher</button>
        </div>

        <label class="field-group" for="email">
          <span class="field-label">Email</span>
          <input type="email" id="email" class="input" placeholder="name@school.edu">
        </label>
        <label class="field-group" for="password">
          <span class="field-label">Password</span>
          <input type="password" id="password" class="input" placeholder="Enter your password">
        </label>

        <button id="loginBtn" class="button">Login</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="login.js"></script>
</body>
</html>
