<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Passages - ReadWise</title>
  <link rel="stylesheet" href="../stylesheets/shared.css">
</head>
<body>
<div class="demo-banner">ReadWise System | Pulo National High School</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">RW</div><h2>ReadWise</h2><p>Student Portal</p>
    </div>
    <nav>
      <a href="student-profile.html"><span class="icon">&#128100;</span> My Profile</a>
      <a href="student-dashboard.html"><span class="icon">&#8962;</span> Dashboard</a>
      <a href="student-passage.html" class="active"><span class="icon">&#128214;</span> My Passage</a>
      <a href="student-progress.html"><span class="icon">&#128202;</span> My Progress</a>
      <a href="student-pre-assessment.html"><span class="icon">&#128221;</span> Pre-Assessment</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="sb-name">-</strong>Grade 7</div>
      <button class="logout-btn" onclick="sessionStorage.clear();window.location.href='../login.html'">&larr; Logout</button>
    </div>
  </aside>
  <main class="main">
    <div class="page-header">
      <h1>My Weekly Passages</h1>
      <p id="week-subtitle">Weekly class-based reading assignments</p>
    </div>
    <div class="card" id="passage-detail"></div>
  </main>
</div>
<script src="../mockData.js"></script>
<script>
  const student = getCurrentStudent();
  if (!student) {
    window.location.href = "../login.html";
    throw new Error("Missing student session");
  }
  const week = getActiveWeek();
  const passages = getStudentWeeklyPassages(student, week);
  const completedIds = getCompletedPassages(student.id, week);
  document.getElementById("sb-name").textContent = student.name;
  document.getElementById("week-subtitle").textContent =
    "Week " + week + " assignments for " + getClassDisplayName(student.classLevel) + " class (" +
    passages.length + " passages)";

  const container = document.getElementById("passage-detail");

  if (!passages.length) {
    container.innerHTML =
      '<div style="padding:20px;background:#fff3cd;border-radius:8px;color:var(--secondary)">' +
      "<strong>No passages assigned yet.</strong><br>" +
      "Your teacher has not assigned this week's set of passages for your class." +
      "</div>";
  } else {
    const pending = passages.filter(function(passage) { return !completedIds.includes(passage.id); });
    const nextPassage = pending[0] || passages[0];
    container.innerHTML =
      '<div style="margin-bottom:14px;padding:12px;border-radius:8px;background:#f7fafc">' +
      '<strong style="color:var(--secondary)">Next passage to complete:</strong> ' + nextPassage.title +
      "</div>" +
      passages.map(function(passage, index) {
        const done = completedIds.includes(passage.id);
        const status = done
          ? '<span class="badge badge-easy">Completed</span>'
          : '<span class="badge badge-moderate">Pending</span>';
        const buttonStyle = done ? "btn-outline" : "btn-primary";
        const buttonText = done ? "Review Passage" : "Start Reading";
        const preview = passage.text.split("\n")[0].slice(0, 260).trim() + "...";
        return (
          '<div style="border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">' +
              '<div>' +
                '<div style="margin-bottom:6px">' +
                  '<span class="badge ' + badgeClass(passage.label) + '">' + passage.label + '</span>' +
                  '<span class="badge badge-primary" style="margin-left:6px">' + passage.genre + '</span>' +
                  '<span style="margin-left:6px;font-size:11px;color:var(--muted)">Passage ' + (index + 1) + " of " + passages.length + "</span>" +
                "</div>" +
                '<h3 style="font-size:18px;color:var(--secondary);margin-bottom:4px">' + passage.title + "</h3>" +
                '<p style="font-size:13px;color:var(--muted);margin-bottom:8px">' + passage.words + " words - ~" + passage.time + " min</p>" +
              "</div>" +
              status +
            "</div>" +
            '<p style="font-size:14px;color:#4a5568;line-height:1.7;margin-bottom:10px">' + preview + "</p>" +
            '<a href="student-reading.html?id=' + passage.id + '" class="btn ' + buttonStyle + '">' + buttonText + "</a>" +
          "</div>"
        );
      }).join("");
  }
</script>
</body>
</html>
