<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading - ReadWise</title>
  <link rel="stylesheet" href="../stylesheets/shared.css">
  <style>
    .reading-page { max-width:760px; margin:0 auto; }
    .timer-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 20px;
      margin-bottom:20px;
      position:sticky;
      top:calc(var(--banner-height) + 12px);
      z-index:50;
      border:1px solid var(--border);
      border-radius:18px;
      background:var(--surface-elevated);
      box-shadow:var(--shadow-sm);
      backdrop-filter:blur(16px) saturate(135%);
    }
    .timer-val { font-size:18px; font-weight:800; color:var(--primary); font-variant-numeric:tabular-nums; }
  </style>
</head>
<body>
<div class="demo-banner">ReadWise System | Pulo National High School</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">RW</div><h2>ReadWise</h2><p>Student Portal</p>
    </div>
    <nav>
      <a href="student-profile.html"><span class="icon"></span> My Profile</a>
      <a href="student-dashboard.html"><span class="icon"></span> Dashboard</a>
      <a href="student-passage.html" class="active"><span class="icon"></span> My Passage</a>
      <a href="student-progress.html"><span class="icon"></span> My Progress</a>
      <a href="student-pre-assessment.html"><span class="icon"></span> Pre-Assessment</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><strong id="sb-name">-</strong>Grade 7</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </aside>
  <main class="main">
    <div class="reading-page">
      <button class="back-btn" onclick="history.back()">&larr; Back</button>
      <div class="timer-bar">
        <div>
          <span style="font-size:13px;color:var(--muted);font-weight:600">Reading Time</span>
          <span class="timer-val" id="timer" style="margin-left:10px">0:00</span>
        </div>
        <div id="timer-status" style="font-size:13px;color:var(--muted)">Reading in progress...</div>
      </div>
      <div id="week-warning" style="display:none;margin-bottom:12px;padding:10px 12px;border-radius:8px;background:#fff3cd;color:var(--secondary);font-size:13px"></div>
      <div class="card" id="passage-body">
        <div id="passage-meta" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)"></div>
        <div class="reading-area" id="passage-text"></div>
        <div style="margin-top:30px;text-align:center">
          <button class="btn btn-primary" id="next-btn" onclick="goToQuestions()" style="font-size:16px;padding:12px 32px">
            Done Reading - Answer Questions
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../api.js"></script>
<script src="../mockData.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const pid = params.get("id") || "p3";
  const week = ReadWiseAPI.getActiveWeek();

  async function bootstrapPage() {
    let auth = null;
    let passage = null;
    let weeklyIds = [];

    try {
      auth = await ReadWiseAPI.me();
      if (!auth || !auth.user || auth.user.role !== "student" || !auth.user.student) {
        throw new Error("Unauthorized");
      }
      document.getElementById("sb-name").textContent = auth.user.student.name || "Student";
      passage = await ReadWiseAPI.getPassage(pid);
      const weekly = await ReadWiseAPI.getStudentWeeklyPassages(week);
      weeklyIds = ((weekly && weekly.passages) || []).map(function(entry) { return entry.id; });
    } catch (error) {
      window.location.href = "../login.html";
      return;
    }

    if (!passage) {
      document.getElementById("passage-body").innerHTML =
        '<div style="font-size:14px;color:var(--hard)">Passage not found.</div>';
      return;
    }

    if (!weeklyIds.includes(pid)) {
      const warning = document.getElementById("week-warning");
      warning.style.display = "block";
      warning.textContent = "This passage is outside your Week " + week + " assigned list.";
    }

    document.getElementById("passage-meta").innerHTML =
      '<div style="margin-bottom:8px">' +
      '<span class="badge ' + badgeClass(passage.label) + '">' + passage.label + '</span>' +
      '<span class="badge badge-primary" style="margin-left:6px">' + passage.genre + '</span>' +
      '<span style="margin-left:8px;font-size:12px;color:var(--muted)">Week ' + week + "</span>" +
      "</div>" +
      '<h2 style="font-size:20px;font-weight:700;color:var(--secondary);margin-bottom:4px">' + passage.title + "</h2>" +
      '<p style="font-size:13px;color:var(--muted)">' + passage.words + " words - ~" + passage.time + " min reading time</p>";

    const paraText = passage.text.split("\n").map(function(para) {
      return para.trim() ? '<p style="margin-bottom:1.2em">' + para.trim() + "</p>" : "";
    }).join("");
    document.getElementById("passage-text").innerHTML = paraText;
  }

  let secs = 0;
  let timerInterval = setInterval(tick, 1000);
  function tick() {
    secs++;
    const minutes = Math.floor(secs / 60);
    const seconds = secs % 60;
    document.getElementById("timer").textContent = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
  }

  function goToQuestions() {
    clearInterval(timerInterval);
    const minutes = Math.floor(secs / 60);
    const seconds = secs % 60;
    const timeStr = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
    document.getElementById("timer-status").textContent = "Reading Time: " + timeStr;
    document.getElementById("next-btn").disabled = true;
    document.getElementById("next-btn").textContent = "Proceeding...";
    sessionStorage.setItem("readingTime_" + pid, timeStr);
    setTimeout(function() {
      window.location.href = "student-questions.html?id=" + pid;
    }, 600);
  }

  async function logout() {
    try {
      await ReadWiseAPI.logout();
    } catch (error) {
      // ignore logout API errors
    }
    sessionStorage.clear();
    window.location.href = "../login.html";
  }

  bootstrapPage();
</script>
</body>
</html>
